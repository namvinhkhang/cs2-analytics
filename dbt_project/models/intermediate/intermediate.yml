version: 2

models:
  - name: int_matches_unioned
    description: "Modern matches from FACEIT and PandaScore unioned with source column preserved"
    columns:
      - name: match_id
        data_tests:
          - not_null
      - name: source
        data_tests:
          - not_null
          - accepted_values:
              values: ['faceit', 'pandascore']

  - name: int_players_unioned
    description: "Deduplicated modern player stats from FACEIT, PandaScore, and CS API"
    columns:
      - name: player_id
        data_tests:
          - not_null
      - name: source
        data_tests:
          - not_null
          - accepted_values:
              values: ['faceit', 'pandascore', 'csapi']
