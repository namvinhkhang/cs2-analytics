version: 2

models:
  - name: mart_team_performance
    description: "Team win rates, overall record, and world ranking per team (WH-04)"
    columns:
      - name: team_id
        data_tests:
          - not_null
          - unique
      - name: win_rate
        data_tests:
          - not_null

  - name: mart_player_leaderboard
    description: "Per-player aggregated stats with within-tier percent_rank columns (WH-05)"
    columns:
      - name: player_id
        data_tests:
          - not_null

  - name: mart_map_meta
    description: "Pick rates and side win rates per map across all historical matches (WH-06)"
    columns:
      - name: map_name
        data_tests:
          - unique
          - not_null
      - name: pick_rate
        data_tests:
          - not_null

  - name: mart_head2head
    description: "All pairwise historical matchup records with canonical pair ordering (WH-07)"
    columns:
      - name: team_1_id
        data_tests:
          - not_null
      - name: team_2_id
        data_tests:
          - not_null
      - name: total_matches
        data_tests:
          - not_null

  - name: mart_upset_features
    description: "Pre-computed feature set for Upset Tracker ML model; upset defined as ranking_delta > 5 and underdog wins (WH-08)"
    columns:
      - name: match_sk
        data_tests:
          - unique
          - not_null
      - name: is_upset
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: team_a_name
        description: "Readable team label for dashboard display."
      - name: team_b_name
        description: "Readable team label for dashboard display."

  - name: mart_hidden_gems
    description: "Players in tier 2/3/4 with 3+ available stats clearing top-15% thresholds from the tier above, a dashboard-filterable recent 90-day sample-size field, and 90-day benchmark-gap trend direction (HG-01..04). Player-level clutch rate is skipped until a trustworthy source is persisted."
    columns:
      - name: player_id
        data_tests:
          - not_null
      - name: is_hidden_gem
        data_tests:
          - not_null
      - name: prospect_score
        description: "Sortable score based on tier-above threshold clears and sample size."
        data_tests:
          - not_null
      - name: team_name
        description: "Readable current team label for dashboard display."
      - name: team_region
        description: "Team region when available from current team metadata."
      - name: recent_90_day_maps_played
        description: "Recent 90-day player stat rows used as the sample-size eligibility count."
        data_tests:
          - not_null
      - name: minimum_recent_90_day_maps
        description: "Minimum recent 90-day stat rows required for Hidden Gem eligibility."
        data_tests:
          - not_null
      - name: meets_recent_sample_size
        description: "True when the player has enough recent 90-day stat rows to avoid one-off outliers."
        data_tests:
          - not_null
      - name: trend_direction
        description: "Trend of the player's normalized gap to tier-above benchmarks over the latest 90-day window compared with the previous 90-day window."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['gap_growing', 'gap_shrinking', 'gap_flat', 'insufficient_history']
      - name: recent_90_day_gap_to_tier_above
        description: "Average normalized gap between recent 90-day available stats and tier-above thresholds."
      - name: previous_90_day_gap_to_tier_above
        description: "Average normalized gap between previous 90-day available stats and tier-above thresholds."
      - name: gap_delta_to_tier_above
        description: "Recent 90-day benchmark gap minus previous 90-day benchmark gap."

  - name: mart_choke_profile
    description: "Team pressure performance from unofficial HLTV round history: largest lead, 5+ lead-blown rate, halftime collapse/comeback, overtime record, close-map record, and explicit data availability flags (CC-01..04)."
    columns:
      - name: team_id
        data_tests:
          - unique
          - not_null
      - name: team_name
        description: "Readable team label from dim_teams when available, otherwise HLTV cache name."
        data_tests:
          - not_null
      - name: maps_analyzed
        description: "Parsed HLTV maps included for this team."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: rounds_analyzed
        description: "Parsed round rows included for this team."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: overtime_maps_analyzed
        description: "Parsed maps that reached overtime."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: close_maps_analyzed
        description: "Parsed maps decided by two rounds or fewer."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: maps_with_5plus_lead
        description: "Maps where this team held a five-round or larger lead."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: minimum_stable_maps
        description: "Minimum parsed maps required for the stable sample-quality bucket."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: sample_quality
        description: "Sample-size bucket: limited under 20 maps, directional for 20-49, stable at 50+."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['limited', 'directional', 'stable']
      - name: lead_blown_rate_display
        description: "Coalesced lead-blown rate for dashboard display; raw lead_blown_rate stays nullable."
        data_tests:
          - not_null
      - name: largest_lead
        description: "Largest round lead this team held on any parsed map."
      - name: halftime_leads_lost
        description: "Maps lost after leading at halftime."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: halftime_comeback_rate_display
        description: "Coalesced halftime comeback rate for dashboard display; raw comeback_rate stays nullable."
        data_tests:
          - not_null
      - name: lead_blown_rate_delta
        description: "Lead-blown rate minus the parsed-map league average."
      - name: halftime_comeback_rate_delta
        description: "Halftime comeback rate minus the parsed-map league average."
      - name: ot_win_rate_delta
        description: "Overtime win rate minus the parsed-map league average."
      - name: close_map_win_rate_delta
        description: "Close-map win rate minus the parsed-map league average."
      - name: comeback_metric_type
        description: "Documents whether comeback_rate is exact halftime logic or a proxy."
        data_tests:
          - not_null
      - name: halftime_data_available
        description: "True when round-history rows allow halftime score reconstruction."
        data_tests:
          - not_null
      - name: metric_source
        description: "Source system used for pressure metrics."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['hltv_unofficial']
      - name: round_history_available
        description: "True when exact round-history rows are available for this team."
        data_tests:
          - not_null
      - name: clutch_data_available
        description: "False because player-level clutch events are out of v1 scope."
        data_tests:
          - not_null
      - name: bracket_data_available
        description: "False until bracket-position facts are ingested."
        data_tests:
          - not_null
      - name: sample_size_warning
        description: "True when a team has fewer than 20 parsed maps."
        data_tests:
          - not_null
