name: Dashboard Refresh

on:
  schedule:
    # GitHub schedule times are UTC. Daily refresh runs at 06:17 Eastern during EDT.
    - cron: "17 10 * * *"
    # Weekly refresh runs Monday at 07:43 Eastern during EDT.
    - cron: "43 11 * * 1"
  workflow_dispatch:
    inputs:
      profile:
        description: "Refresh profile to run"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly

permissions:
  contents: write

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: ${{ secrets.CS2_AWS_REGION }}
      CS2_AWS_REGION: ${{ secrets.CS2_AWS_REGION }}
      CS2_AWS_S3_BUCKET: ${{ secrets.CS2_AWS_S3_BUCKET }}
      CS2_FACEIT_API_KEY: ${{ secrets.CS2_FACEIT_API_KEY }}
      CS2_PANDASCORE_API_KEY: ${{ secrets.CS2_PANDASCORE_API_KEY }}
      CS2_LIQUIPEDIA_API_KEY: ${{ secrets.CS2_LIQUIPEDIA_API_KEY }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked

      - name: Resolve refresh profile
        id: refresh
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            profile="${{ inputs.profile }}"
          elif [[ "${{ github.event.schedule }}" == "43 11 * * 1" ]]; then
            profile="weekly"
          else
            profile="daily"
          fi
          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          echo "Running ${profile} dashboard refresh"

      - name: Write Snowflake private key
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/snowflake_key.p8"
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ["SNOWFLAKE_PRIVATE_KEY"]
          if "\\n" in key and "\n" not in key.strip():
              key = key.replace("\\n", "\n")
          Path(os.environ["RUNNER_TEMP"], "snowflake_key.p8").write_text(key, encoding="utf-8")
          PY
          chmod 600 "$key_path"
          echo "SNOWFLAKE_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Generate dbt profile
        shell: bash
        run: |
          cat > dbt_project/profiles.yml <<'YAML'
          cs2_analytics:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
                user: "{{ env_var('SNOWFLAKE_USER') }}"
                private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
                role: TRANSFORMER
                warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
                database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
                schema: STAGING
                threads: 4
          YAML

      - name: Ingest CS API profile
        shell: bash
        run: uv run python scripts/bootstrap_csapi.py --profile "${{ steps.refresh.outputs.profile }}"

      - name: Ingest Valve team regions
        shell: bash
        run: |
          uv run python - <<'PY'
          from datetime import date

          import boto3
          from botocore.exceptions import ClientError

          from cs2_analytics.ingestion.valve import (
              build_valve_team_regions_s3_key,
              ingest_latest_team_regions_sync,
          )
          from cs2_analytics.utils.config import settings

          ingest_date = date.today()
          key = build_valve_team_regions_s3_key(ingest_date)
          s3 = boto3.client("s3", region_name=settings.aws_region)
          try:
              s3.head_object(Bucket=settings.aws_s3_bucket, Key=key)
              print(f"Valve region snapshot already exists at s3://{settings.aws_s3_bucket}/{key}")
          except ClientError as exc:
              error_code = str(exc.response.get("Error", {}).get("Code", ""))
              if error_code not in {"404", "NoSuchKey", "NotFound"}:
                  raise
              count = ingest_latest_team_regions_sync(
                  bucket=settings.aws_s3_bucket,
                  ingest_date=ingest_date,
                  region=settings.aws_region,
              )
              print(f"Ingested {count} Valve team-region rows to s3://{settings.aws_s3_bucket}/{key}")
          PY

      - name: Load raw Parquet data into Snowflake
        shell: bash
        run: |
          uv run python - <<'PY'
          import os
          import sys

          import snowflake.connector
          from snowflake.connector.errors import ProgrammingError

          RAW_LOADS = (
              ("raw_csapi_matches", "cs2_raw_stage/csapi/matches/"),
              ("raw_csapi_team_rankings", "cs2_raw_stage/csapi/team_rankings/"),
              ("raw_csapi_player_stats", "cs2_raw_stage/csapi/player_stats/"),
              ("raw_valve_team_regions", "cs2_raw_stage/valve/team_regions/"),
              ("raw_hltv_round_history", "cs2_raw_stage/hltv_unofficial/round_history/"),
          )

          database = os.environ["SNOWFLAKE_DATABASE"]
          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              authenticator="SNOWFLAKE_JWT",
              private_key_file=os.environ["SNOWFLAKE_PRIVATE_KEY_PATH"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
              database=database,
          )
          try:
              cursor = conn.cursor()
              for table, stage_prefix in RAW_LOADS:
                  table_name = f"{database}.RAW.{table}"
                  try:
                      cursor.execute(f"SELECT 1 FROM {table_name} LIMIT 0")
                  except ProgrammingError as exc:
                      print(
                          f"RAW.{table} is missing or inaccessible. "
                          "Run the one-time Snowflake setup SQL from "
                          "dbt_project/setup/snowflake_setup.sql with an admin role, "
                          "then grant TRANSFORMER SELECT and INSERT on the table.",
                          file=sys.stderr,
                      )
                      raise SystemExit(1) from exc
                  cursor.execute(
                      f"""
                      COPY INTO {table_name}
                        FROM @{database}.RAW.{stage_prefix}
                        FILE_FORMAT = (TYPE = PARQUET)
                        MATCH_BY_COLUMN_NAME = CASE_INSENSITIVE
                        ON_ERROR = CONTINUE
                        PURGE = FALSE
                      """
                  )
                  print(f"Loaded staged Parquet into {table_name} from {stage_prefix}")
          finally:
              conn.close()
          PY

      - name: Install dbt packages
        run: uv run dbt deps --project-dir dbt_project

      - name: Run targeted dbt models
        shell: bash
        run: |
          if [[ "${{ steps.refresh.outputs.profile }}" == "weekly" ]]; then
            selector="+mart_upset_features +mart_hidden_gems +mart_choke_profile"
          else
            selector="+mart_upset_features +mart_hidden_gems"
          fi
          uv run dbt run --select $selector --project-dir dbt_project --profiles-dir dbt_project

      - name: Test targeted dbt models
        shell: bash
        run: |
          if [[ "${{ steps.refresh.outputs.profile }}" == "weekly" ]]; then
            selector="+mart_upset_features +mart_hidden_gems +mart_choke_profile"
          else
            selector="+mart_upset_features +mart_hidden_gems"
          fi
          uv run dbt test --select $selector --project-dir dbt_project --profiles-dir dbt_project

      - name: Retrain Upset Tracker model
        if: steps.refresh.outputs.profile == 'weekly'
        run: uv run python -m ml.train

      - name: Export dashboard snapshots
        run: uv run python -m dashboard.export_snapshots

      - name: Commit refreshed artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/snapshots ml/models ml/evaluation ml/MODEL_CARD.md
          if git diff --cached --quiet; then
            echo "No dashboard artifacts changed."
            exit 0
          fi
          git commit -m "chore(dashboard): refresh snapshots"
          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            git pull --rebase origin "${branch}"
            if git push origin "HEAD:${branch}"; then
              exit 0
            fi
            echo "Push failed because ${branch} moved; retrying (${attempt}/3)."
            sleep $((attempt * 5))
          done
          echo "Unable to push refreshed dashboard artifacts after 3 attempts."
          exit 1
